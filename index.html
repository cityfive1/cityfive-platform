
<!DOCTYPE html>
<html>
<head>
  <title>CityFive Holdings Ltd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- HEADER -->
<header class="flex justify-between items-center p-5 bg-gray-800">
  <h1 class="text-xl font-bold text-yellow-400">CityFive</h1>
</header>

<!-- HERO -->
<section class="text-center py-10">
  <h2 class="text-3xl font-bold mb-4">Welcome to CityFive Holdings</h2>
  <p class="text-gray-400">Secure Crypto Platform</p>
</section>

<!-- LOGIN -->
<div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl">
  <input id="email" placeholder="Email" class="w-full p-2 mb-2 text-black">
  <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-2 text-black">

  <button onclick="register()" class="bg-green-500 w-full p-2 mb-2 rounded">Register</button>
  <button onclick="login()" class="bg-yellow-400 text-black w-full p-2 rounded">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden text-center mt-10">
  <h2 class="text-2xl">Dashboard</h2>
  <p id="userEmail"></p>
</div>

<script>
const API = "https://cityfive-platform-production.up.railway.app";

function register() {
  fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => alert(data.message))
  .catch(err => alert("Error: " + err));
}

function login() {
  fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => {
    if (res.status === 200) {
      document.getElementById("dashboard").classList.remove("hidden");
      document.getElementById("userEmail").innerText =
        "Welcome " + document.getElementById("email").value;
    } else {
      alert("Login failed");
    }
  })
  .catch(err => alert("Error: " + err));
}
</script>

</body>
</html>
